  <circle cx="195" cy="390" r="38" fill="url(#gold)" filter="url(#cardShadow)"/>
  <text x="195" y="383" text-anchor="middle" fill="#1e1b4b" font-size="28">🎲</text>
  <text x="195" y="405" text-anchor="middle" fill="#1e1b4b" font-size="11" font-weight="bold">跳棋</text>

  <!-- Player piece -->
  <circle cx="50" cy="254" r="10" fill="#fbbf24"/>
  <text x="50" y="258" text-anchor="middle" fill="#1e1b4b" font-size="12">🚗</text>

