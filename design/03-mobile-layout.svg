<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" style="background:#0f0f23;font-family:sans-serif">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
    <filter id="cardShadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="390" height="844" fill="#0f0f23"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="390" height="44" fill="#1a1a3e"/>
