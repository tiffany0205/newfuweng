<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" style="background:#0a0a1a">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
    <filter id="cardShadow"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="390" height="844" fill="#0a0a1a"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="390" height="50" fill="#141430"/>
  <line x1="0" y1="50" x2="390" y2="50" stroke="#fbbf24" stroke-width="1" opacity="0.12"/>
  <text x="16" y="32" fill="#fbbf24" font-size="15" font-weight="900">🎲 LUCKY JUMP</text>
  <circle cx="360" cy="25" r="8" fill="#34d399"/>

  <!-- Scroll content -->
  <!-- Stats row -->
  <g transform="translate(12,60)">
    <rect x="0" y="0" width="86" height="52" rx="10" fill="#1e1b4b" stroke="#2d2a5e" stroke-width="0.5"/>
    <text x="43" y="20" text-anchor="middle" fill="#7b75a3" font-size="9">机会</text>
    <text x="43" y="40" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="900">12</text>

    <rect x="92" y="0" width="86" height="52" rx="10" fill="#1e1b4b" stroke="#2d2a5e" stroke-width="0.5"/>
    <text x="135" y="20" text-anchor="middle" fill="#7b75a3" font-size="9">圈数</text>
    <text x="135" y="40" text-anchor="middle" fill="#34d399" font-size="16" font-weight="900">3</text>

    <rect x="184" y="0" width="86" height="52" rx="10" fill="#1e1b4b" stroke="#2d2a5e" stroke-width="0.5"/>
    <text x="227" y="20" text-anchor="middle" fill="#7b75a3" font-size="9">格子</text>
    <text x="227" y="40" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="900">20</text>

    <rect x="276" y="0" width="86" height="52" rx="10" fill="#1e1b4b" stroke="#2d2a5e" stroke-width="0.5"/>
    <text x="319" y="20" text-anchor="middle" fill="#7b75a3" font-size="9">VIP</text>
    <text x="319" y="40" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="900">⭐2</text>
  </g>

  <!-- Board label -->
  <text x="16" y="145" fill="#a78bfa" font-size="10" font-weight="bold" letter-spacing="3">棋 盘</text>
  <line x1="16" y1="155" x2="50" y2="155" stroke="url(#goldGrad)" stroke-width="1.5"/>

  <!-- Mini board -->
  <g transform="translate(12,165)">
    <rect x="0" y="0" width="366" height="280" rx="14" fill="#1c1c3a" stroke="#2d2a5e" stroke-width="0.5" filter="url(#cardShadow)"/>

    <!-- Simplified perimeter cells -->
    <rect x="12" y="12" width="342" height="44" rx="10" fill="#1e1b4b"/>
    <text x="183" y="39" text-anchor="middle" fill="#3b3780" font-size="10">⬆ 顶边 9格 (1-9) ⬆</text>

    <rect x="12" y="62" width="44" height="154" rx="10" fill="#1e1b4b"/>
    <text x="34" y="143" text-anchor="middle" fill="#3b3780" font-size="10">← 左</text>

    <rect x="310" y="62" width="44" height="154" rx="10" fill="#1e1b4b"/>
    <text x="332" y="143" text-anchor="middle" fill="#3b3780" font-size="10">右 →</text>

    <rect x="12" y="222" width="342" height="44" rx="10" fill="#1e1b4b"/>
    <text x="183" y="249" text-anchor="middle" fill="#3b3780" font-size="10">⬇ 底边 9格 ⬇</text>

    <!-- Center dice area -->
    <rect x="68" y="68" width="230" height="140" rx="14" fill="#141430"/>
    <text x="183" y="112" text-anchor="middle" fill="#fff" font-size="16" font-weight="900">LUCKY JUMP</text>
    <g transform="translate(183,140)">
      <rect x="-45" y="0" width="90" height="42" rx="10" fill="url(#btnGrad)"/>
      <text x="0" y="27" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🎲 跳棋</text>
    </g>
    <text x="183" y="198" text-anchor="middle" fill="#3b3780" font-size="9">每次消耗 1 次机会</text>
  </g>

  <!-- Tasks -->
  <text x="16" y="478" fill="#a78bfa" font-size="10" font-weight="bold" letter-spacing="3">任 务</text>
  <line x1="16" y1="488" x2="50" y2="488" stroke="url(#goldGrad)" stroke-width="1.5"/>

  <g transform="translate(12,498)">
    <rect x="0" y="0" width="366" height="52" rx="12" fill="#1e1b4b" stroke="#2d2a5e" stroke-width="0.5" filter="url(#cardShadow)"/>
    <text x="16" y="22" fill="#fff" font-size="18">📅</text>
    <text x="50" y="24" fill="#e2e0f3" font-size="12" font-weight="bold">每日签到</text>
    <text x="50" y="40" fill="#7b75a3" font-size="10">普通5次·连续7天10次</text>
    <rect x="292" y="10" width="58" height="30" rx="8" fill="url(#goldGrad)"/>
    <text x="321" y="30" text-anchor="middle" fill="#1e1b4b" font-size="10" font-weight="bold">签到</text>

    <rect x="0" y="60" width="366" height="52" rx="12" fill="#1e1b4b" stroke="#2d2a5e" stroke-width="0.5" filter="url(#cardShadow)"/>
    <text x="16" y="82" fill="#fff" font-size="18">💳</text>
    <text x="50" y="84" fill="#e2e0f3" font-size="12" font-weight="bold">充值奖励</text>
    <text x="50" y="100" fill="#7b75a3" font-size="10">每10U得10次</text>
    <rect x="292" y="70" width="58" height="30" rx="8" fill="url(#goldGrad)"/>
    <text x="321" y="90" text-anchor="middle" fill="#1e1b4b" font-size="10" font-weight="bold">充值</text>

    <rect x="0" y="120" width="366" height="52" rx="12" fill="#1e1b4b" stroke="#2d2a5e" stroke-width="0.5" filter="url(#cardShadow)"/>
    <text x="16" y="142" fill="#fff" font-size="18">👥</text>
    <text x="50" y="144" fill="#e2e0f3" font-size="12" font-weight="bold">邀请好友</text>
    <text x="50" y="160" fill="#7b75a3" font-size="10">每邀请1人得5次</text>
    <rect x="292" y="130" width="58" height="30" rx="8" fill="url(#goldGrad)"/>
    <text x="321" y="150" text-anchor="middle" fill="#1e1b4b" font-size="10" font-weight="bold">邀请</text>
  </g>

  <!-- Leaderboard -->
  <text x="16" y="700" fill="#a78bfa" font-size="10" font-weight="bold" letter-spacing="3">排 行 榜</text>
  <line x1="16" y1="710" x2="50" y2="710" stroke="url(#goldGrad)" stroke-width="1.5"/>

  <g transform="translate(12,720)">
    <rect x="0" y="0" width="366" height="76" rx="12" fill="#1e1b4b" stroke="#2d2a5e" stroke-width="0.5" filter="url(#cardShadow)"/>
    <text x="20" y="24" fill="#fbbf24" font-size="12">🥇 1</text><text x="60" y="24" fill="#fff" font-size="11">王***</text><text x="300" y="24" text-anchor="end" fill="#fbbf24" font-size="11">5圈32格</text>
    <text x="20" y="46" fill="#c0c0c0" font-size="12">🥈 2</text><text x="60" y="46" fill="#d1d5db" font-size="11">李***</text><text x="300" y="46" text-anchor="end" fill="#d1d5db" font-size="11">4圈28格</text>
    <text x="20" y="68" fill="#d97706" font-size="12">🥉 3</text><text x="60" y="68" fill="#d1d5db" font-size="11">张***</text><text x="300" y="68" text-anchor="end" fill="#d1d5db" font-size="11">4圈15格</text>
  </g>

  <!-- Bottom nav -->
  <g transform="translate(0,804)">
    <rect x="0" y="0" width="390" height="40" fill="#141430"/>
    <line x1="0" y1="0" x2="390" y2="0" stroke="#fbbf24" stroke-width="0.5" opacity="0.1"/>
    <text x="65" y="26" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">🎯 棋盘</text>
    <text x="195" y="26" text-anchor="middle" fill="#7b75a3" font-size="11">🏆 排行</text>
    <text x="325" y="26" text-anchor="middle" fill="#7b75a3" font-size="11">👤 我的</text>
  </g>
</svg>