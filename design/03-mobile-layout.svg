    <text x="16" y="24" fill="#fff" font-size="18">📅</text>
    <text x="48" y="26" fill="#e2e0f3" font-size="12" font-weight="bold">每日签到</text>
    <text x="48" y="44" fill="#7b75a3" font-size="10">普通5次·连续7天得10次</text>
    <rect x="292" y="10" width="60" height="32" rx="8" fill="url(#gold)"/>
    <text x="322" y="31" text-anchor="middle" fill="#1e1b4b" font-size="11" font-weight="bold">签到</text>

    <rect x="0" y="62" width="366" height="56" rx="12" fill="#1e1b4b" filter="url(#cardShadow)"/>
    <text x="16" y="86" fill="#fff" font-size="18">💳</text>
    <text x="48" y="88" fill="#e2e0f3" font-size="12" font-weight="bold">充值任务</text>
    <text x="48" y="106" fill="#7b75a3" font-size="10">每10U得10次</text>
    <rect x="292" y="72" width="60" height="32" rx="8" fill="url(#gold)"/>
    <text x="322" y="93" text-anchor="middle" fill="#1e1b4b" font-size="11" font-weight="bold">充值</text>
  </g>

  <!-- Leaderboard -->
  <text x="16" y="722" fill="#fbbf24" font-size="14" font-weight="bold">🏆 排行榜</text>
  <g transform="translate(12,738)">
    <rect x="0" y="0" width="366" height="90" rx="12" fill="#1e1b4b" filter="url(#cardShadow)"/>
    <text x="20" y="28" fill="#fbbf24" font-size="12">🥇 1 王***</text><text x="310" y="28" fill="#fbbf24" font-size="12" text-anchor="end">5圈32格</text>
    <text x="20" y="50" fill="#c0c0c0" font-size="12">🥈 2 李***</text><text x="310" y="50" fill="#d1d5db" font-size="12" text-anchor="end">4圈28格</text>
    <text x="20" y="72" fill="#d97706" font-size="12">🥉 3 张***</text><text x="310" y="72" fill="#d1d5db" font-size="12" text-anchor="end">4圈15格</text>
  </g>

  <!-- Bottom nav -->
  <rect x="0" y="804" width="390" height="40" fill="#1e1b4b"/>
  <text x="65" y="830" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">🎯 棋盘</text>
  <text x="195" y="830" text-anchor="middle" fill="#7b75a3" font-size="13">🏆 排行</text>
  <text x="325" y="830" text-anchor="middle" fill="#7b75a3" font-size="13">👤 我的</text>
</svg>