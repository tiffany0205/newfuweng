  <rect x="310" y="15" width="60" height="14" rx="7" fill="#34d399"/>

  <!-- Top bar -->
  <rect x="0" y="44" width="390" height="48" fill="#1e1b4b" opacity="0.95"/>
  <text x="16" y="73" fill="#fbbf24" font-size="15" font-weight="bold">🎲 幸运跳棋大冒险</text>
  <text x="340" y="73" fill="#a78bfa" font-size="11">admin</text>

  <!-- Main content scroll area -->
  <!-- Stats row - 4 items in a row -->
  <g transform="translate(12,104)">
    <rect x="0" y="0" width="86" height="56" rx="10" fill="#1e1b4b" filter="url(#cardShadow)"/>
    <text x="43" y="22" text-anchor="middle" fill="#a78bfa" font-size="10">机会</text>
    <text x="43" y="44" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="bold">12</text>

    <rect x="92" y="0" width="86" height="56" rx="10" fill="#1e1b4b" filter="url(#cardShadow)"/>
    <text x="135" y="22" text-anchor="middle" fill="#a78bfa" font-size="10">圈数</text>
    <text x="135" y="44" text-anchor="middle" fill="#34d399" font-size="18" font-weight="bold">3</text>

    <rect x="184" y="0" width="86" height="56" rx="10" fill="#1e1b4b" filter="url(#cardShadow)"/>
    <text x="227" y="22" text-anchor="middle" fill="#a78bfa" font-size="10">格子</text>
    <text x="227" y="44" text-anchor="middle" fill="#38bdf8" font-size="18" font-weight="bold">24</text>

    <rect x="276" y="0" width="86" height="56" rx="10" fill="#1e1b4b" filter="url(#cardShadow)"/>
    <text x="319" y="22" text-anchor="middle" fill="#a78bfa" font-size="10">VIP</text>
    <text x="319" y="44" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="bold">⭐2</text>
  </g>

  <!-- Board area -->
  <text x="16" y="200" fill="#fbbf24" font-size="14" font-weight="bold">🎯 棋盘</text>
  <rect x="12" y="212" width="366" height="330" rx="16" fill="#1e1b4b" stroke="#2d2a5e" stroke-width="1"/>
  <!-- Simplified board representation -->
  <rect x="28" y="228" width="334" height="52" rx="10" fill="#25224d"/>
  <text x="195" y="258" text-anchor="middle" fill="#7b75a3" font-size="10">⬆ 顶边 9格 (0-8) ⬆</text>

  <rect x="28" y="286" width="52" height="200" rx="10" fill="#25224d"/>
  <text x="54" y="390" text-anchor="middle" fill="#7b75a3" font-size="10">← 左列</text>

  <rect x="310" y="286" width="52" height="200" rx="10" fill="#25224d"/>
  <text x="336" y="390" text-anchor="middle" fill="#7b75a3" font-size="10">右列 →</text>

  <rect x="28" y="492" width="334" height="52" rx="10" fill="#25224d"/>
  <text x="195" y="522" text-anchor="middle" fill="#7b75a3" font-size="10">⬇ 底边 9格 ⬇</text>

